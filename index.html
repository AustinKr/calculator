<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css" rel="stylesheet">
    <script src="javascript.js" defer></script>
</head>
<body>
    <h1 class="centered-text">Standard Calculator</h1>
    <div class="container">
        <div class="panel-display">
            <div class="display-result"></div>
            <div class="display-current"></div>
        </div>
        <div class="panel-commands">
            <div class="panel-arithmetic">
                <button>+</button>
                <button>-</button>
                <button>x</button>
                <button>÷</button>
            </div>
            <div class="panel-special">
                <button id="decimal-button">.</button>
            </div>
            <div class="panel-numpad">
                <button class="numpad0">0</button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>7</button>
                <button>8</button>
                <button>9</button>
            </div>
            <div class="panel-other">
                <button id="delete-button">Del</button>
                <button id="evaluate-button">=</button>
            </div>
        </div>
    </div>
</body>
</html>
